name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref (push to a PR branch, repeated pushes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev tools
        run: python -m pip install -e '.[dev]'
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Type check
        run: mypy src
      - name: Run offline tests
        # source, branch, and the 95% gate live in pyproject [tool.coverage.*].
        run: pytest --cov
      - name: Smoke the wired shim
        # CI runners lack ~/.claude; plant the minimal delegating shim the hook
        # uses, then run the package's own smoke against a synthetic payload.
        run: |
          mkdir -p "$HOME/.claude/hooks"
          printf 'from smart_trim.features.precompact.command import main\nmain()\n' \
            > "$HOME/.claude/hooks/smart-trim.py"
          python -m smart_trim smoke
